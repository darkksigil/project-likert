@if (isOpen()) {
  <div class="modal-overlay" (click)="onOverlayClick($event)">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">New Duty Request</h2>
        <button class="modal-close" (click)="close()">✕</button>
      </div>

      <div class="modal-body">
        @if (error) { <div class="form-error">{{ error }}</div> }

        <div class="form-row">
          <div class="form-group">
            <label>Full Name <span class="optional">(optional)</span></label>
            <input type="text" [(ngModel)]="name" placeholder="e.g. Juan dela Cruz" />
          </div>
          <div class="form-group">
            <label>Local No. <span class="optional">(optional)</span></label>
            <input type="text" [(ngModel)]="localNum" placeholder="e.g. 1012" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Department <span class="required">*</span></label>
            <select [(ngModel)]="department" class="dept-select" [class.has-value]="department">
              <option value="" disabled selected hidden>Select department . . .</option>
              @for (grp of groupKeys; track grp) {
                <optgroup [label]="'── ' + grp + ' ──'">
                  @for (dept of groupedDepts[grp]; track dept.id) {
                    <option [value]="dept.code">{{ dept.name }}</option>
                  }
                </optgroup>
              }
            </select>
          </div>

          <div class="form-group">
            <label>Concern Type <span class="required">*</span></label>

            @if (isAdmin()) {
              <!-- ✅ Admin can set freely -->
              <select [(ngModel)]="concernType">
                <option value="hardware">🔧 Hardware</option>
                <option value="network">🌐 Network</option>
                <option value="system">💻 System</option>
                <option value="data">🗄 Data</option>
                <option value="other">📋 Other</option>
              </select>
            } @else {
              <!-- ✅ Regular users see their auto-assigned type (read-only) -->
              <div class="auto-type-display">
                <span class="concern-badge concern-auto">{{ autoAssignedType }}</span>
                <span class="auto-type-note">Auto-assigned to your role</span>
              </div>
            }
          </div>
        </div>

        <div class="form-group">
          <label>Concern <span class="required">*</span></label>
          <textarea [(ngModel)]="concern" placeholder="Describe the issue or request..."></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-modal-cancel" (click)="close()">Cancel</button>
        <button class="btn-submit" [disabled]="loading || !isValid" (click)="submit()">
          @if (loading) { <div class="spinner"></div> Submitting... }
          @else { Submit Request }
        </button>
      </div>
    </div>
  </div>
}

<div class="column col-done">
  <div class="column-header">
    <div class="column-title">
      <div class="col-indicator"></div>
      Done
    </div>
    <span class="col-count">{{ duties().length }}</span>
  </div>

  <div class="column-body">
    @if (loading()) {
      @for (s of skeletons; track s) {
        <div class="skeleton-card">
          <div class="skel-line" style="height:10px;width:40%"></div>
          <div class="skel-line" style="height:14px;width:70%"></div>
          <div class="skel-line" style="height:10px;width:55%"></div>
          <div class="skel-line" style="height:32px;width:100%;margin-top:8px"></div>
        </div>
      }
    } @else if (duties().length === 0) {
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <span>No completed requests</span>
      </div>
    } @else {
      @for (duty of duties(); track duty.id) {
        <app-duty-card [duty]="duty" />
      }
    }
  </div>
</div>

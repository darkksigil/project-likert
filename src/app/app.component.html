<!-- Navbar Component -->
<app-navbar (openModal)="modalOpen.set(true)" />

<!-- Board Layout -->
<main class="main">
  <div class="board-header">
    <h1 class="board-title">Dashboard</h1>
    <span class="board-subtitle">// real-time request tracker</span>
  </div>

  <div class="board">
    <!-- Pending Column Component -->
    <app-pending-column />

    <!-- In Progress Column Component -->
    <app-progress-column />

    <!-- Done Column Component -->
    <app-done-column />
  </div>
</main>

<!-- Add Duty Modal Component -->
<app-add-duty-modal [(isOpen)]="modalOpen" />

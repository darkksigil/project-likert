<app-navbar (openModal)="modalOpen.set(true)" />

<main class="main">
  <div class="board-header">
    <div class="board-title-row">
      <div>
        <h1 class="board-title">dashboard</h1>
        <div class="board-subtitle-row">
          <span class="board-subtitle">// real-time request tracker</span>
          <span class="board-date">{{ today }}</span>
        </div>
      </div>
    </div>

    <!-- ── SEARCH + FILTER BAR ── -->
    <div class="board-controls">

      <!-- Search -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          placeholder="Search request, dept, ID..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)" />
        @if (searchQuery()) {
          <button class="search-clear" (click)="searchQuery.set('')">✕</button>
        }
      </div>

      <!-- Concern type filter dropdown -->
      <select class="filter-select" [ngModel]="activeConcernFilter()" (ngModelChange)="setFilter($event)" [class.has-value]="activeConcernFilter() !== 'all'">
        <option value="all">All Types</option>
        @for (entry of concernTypes; track entry[0]) {
          <option [value]="entry[0]">{{ concernIcons[entry[0]] }} {{ entry[1] }}</option>
        }
      </select>

      @if (hasSearch) {
        <button class="btn-clear-filters" (click)="clearSearch()">✕ Clear</button>
      }
    </div>
  </div>

  <!-- ── KANBAN BOARD — board passes data, columns are dumb ── -->
  <div class="board">
    <app-request-column
      [duties]="pending()"
      status="pending"
      title="Pending"
      [loading]="loading()"
      [searchActive]="hasSearch" />

    <app-request-column
      [duties]="inProgress()"
      status="in_progress"
      title="In Progress"
      [loading]="loading()"
      [searchActive]="hasSearch" />

    <app-request-column
      [duties]="done()"
      status="done"
      title="Done"
      [loading]="loading()"
      [searchActive]="hasSearch" />
  </div>
</main>

<app-add-duty-modal [(isOpen)]="modalOpen" />
<app-snackbar />

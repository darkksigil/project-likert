<div class="snackbar-container">

  <!-- ── TOAST NOTIFICATIONS (status changes, edits) ── -->
  @for (toast of toasts(); track toast.id) {
    <div class="toast toast-{{ toast.type }}" (click)="notif.dismiss(toast.id)">
      <span class="toast-icon">
        @switch (toast.type) {
          @case ('success') { ✓ }
          @case ('info')    { ℹ }
          @case ('warning') { ⚠ }
          @case ('error')   { ✕ }
        }
      </span>
      <span class="toast-msg">{{ toast.message }}</span>
      <button class="snack-dismiss">✕</button>
    </div>
  }

  <!-- ── UNDO SNACKBARS (delete with undo) ── -->
  @for (snack of snackbars(); track snack.id) {
    <div class="snackbar">
      <div class="snack-progress" [style.width.%]="(snack.remaining / 10) * 100"></div>
      <div class="snack-body">
        <span class="snack-msg">{{ snack.message }}</span>
        <span class="snack-timer">{{ snack.remaining }}s</span>
        <button class="snack-undo" (click)="undo(snack.id)">↩ Undo</button>
        <button class="snack-dismiss" (click)="dismiss(snack.id)">✕</button>
      </div>
    </div>
  }

</div>
